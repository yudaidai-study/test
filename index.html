<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Todo">
  <meta name="theme-color" content="#007AFF">
  <link rel="apple-touch-icon" href="/test/icons/apple-touch-icon.png">
  <link rel="manifest" href="/test/manifest.json">
  <title>Todo</title>
  <link rel="stylesheet" href="/test/css/app.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>Todo</h1>
      <button id="btn-organize" aria-label="整理">整理</button>
    </header>

    <div class="filter-tabs" role="tablist">
      <button class="tab active"     data-filter="all"       role="tab" aria-selected="true">すべて</button>
      <button class="tab"            data-filter="personal"  role="tab">個人</button>
      <button class="tab"            data-filter="work"      role="tab">仕事</button>
      <button class="tab tab-shop"   data-filter="shopping"  role="tab">買い物</button>
      <button class="tab tab-done"   data-filter="completed" role="tab">完了</button>
    </div>

    <main>
      <div id="banner" class="banner hidden" role="alert"></div>
      <ul id="todo-list" role="list"></ul>
      <p id="empty-msg" class="empty-msg hidden">タスクがありません</p>
    </main>

    <footer class="add-bar">
      <input
        type="text"
        id="new-todo"
        placeholder="タスクを入力..."
        autocomplete="off"
        autocorrect="off"
        maxlength="200"
      >
      <button id="btn-add" aria-label="追加">+</button>
    </footer>
  </div>

  <!-- Add / Edit modal -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="タスクの設定">
    <div class="modal-card">

      <!-- Edit mode: text field -->
      <div id="modal-text-row" class="hidden">
        <textarea id="edit-text" class="edit-textarea" maxlength="200" rows="2"></textarea>
      </div>

      <!-- カテゴリ: shown first -->
      <p class="modal-title">カテゴリ</p>
      <div class="modal-row" id="category-group">
        <button class="chip"          data-category="personal">個人</button>
        <button class="chip"          data-category="work">仕事</button>
        <button class="chip chip-shop" data-category="shopping">買い物</button>
      </div>

      <!-- 重要度・期限: hidden for shopping -->
      <div id="priority-section">
        <p class="modal-title">重要度</p>
        <div class="modal-row" id="priority-group">
          <button class="chip chip-high"   data-priority="high">高</button>
          <button class="chip chip-medium" data-priority="medium">中</button>
          <button class="chip chip-low"    data-priority="low">低</button>
        </div>
      </div>

      <div id="deadline-section">
        <p class="modal-title">期限</p>
        <div class="modal-row" id="deadline-group">
          <button class="chip"           data-deadline="none">なし</button>
          <button class="chip"           data-deadline="soon">すぐ</button>
          <button class="chip"           data-deadline="week">今週</button>
          <button class="chip"           data-deadline="month">今月</button>
          <button class="chip chip-date" data-deadline="date">指定</button>
        </div>
        <div id="deadline-date-row" class="hidden">
          <input type="date" id="deadline-date" class="date-input">
        </div>
      </div>

      <div class="modal-actions">
        <button id="modal-cancel">キャンセル</button>
        <button id="modal-ok" class="btn-primary">追加</button>
      </div>
    </div>
  </div>

  <script src="/test/js/sw-register.js"></script>
  <script type="module" src="/test/js/app.js"></script>
</body>
</html>
